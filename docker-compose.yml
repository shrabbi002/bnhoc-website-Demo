version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bnhoc-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Add other environment variables here or use an .env file
    env_file:
      - .env.local
    restart: always

networks:
  default:
    name: bnhoc-network
